<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Beginner</title>
    <link rel="stylesheet" href="/style/index.css" />
  </head>
  <body>
    <header class="header">
      <img src="/assets/Logo.png" alt="Movie Beginner Logo" />
      <div class="search-box">
        <input
          class="search-input"
          type="text"
          placeholder="영화 제목을 입력하세요"
        />
        <button class="search-button" type="button">
          <img src="/assets/search-icon.png" alt="검색" />
        </button>
      </div>
    </header>

    <main class="main-content">
      <section class="movie-list">
        <h2 class="movie-list-title">지금 인기있는 영화</h2>
        <div class="movies">
          <!-- 영화 카드들이 여기에 추가됩니다 -->
        </div>
        <button class="more-button" type="button">더보기</button>
      </section>
    </main>
    <script type="module" src="/index.js"></script>
  </body>
</html>
